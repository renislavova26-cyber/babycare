name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create APK
        run: |
          mkdir build
          echo "Babycare Recipes App" > build/app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: babycare-apk
          path: build/app.apk
