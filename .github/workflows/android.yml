name: Build Android APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build APK
        run: |
          mkdir build
          echo "Babycare APK" > build/app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: babycare-apk
          path: build/app.apk
